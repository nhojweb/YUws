
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Travels</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#ff6b81,#fbc2eb);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    min-height:100vh;
}

/* Background animation */
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Fade up animation */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Floating animation */
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

nav{
    background:rgba(255,255,255,0.95);
    padding:18px;
    text-align:center;
    box-shadow:0 2px 15px rgba(0,0,0,.15);
    backdrop-filter:blur(10px);
}

nav a{
    text-decoration:none;
    margin:0 20px;
    color:#333;
    font-weight:bold;
    position:relative;
    transition:.3s;
}

nav a::after{
    content:"";
    position:absolute;
    width:0;
    height:3px;
    background:#ff6b81;
    left:0;
    bottom:-5px;
    transition:.3s;
}

nav a:hover::after{
    width:100%;
}

nav a:hover{
    color:#ff6b81;
}

h1{
    text-align:center;
    margin-top:40px;
    color:white;
    font-size:2.5rem;
    animation:fadeUp 1s ease;
}

/* Container */
.travel-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding:40px;
}

/* Card */
.travel-card{
    background:rgba(255,255,255,0.95);
    width:250px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    backdrop-filter:blur(15px);
    text-decoration:none;
    color:#333;
    animation:fadeUp 1s ease, float 4s ease-in-out infinite;
    transition:.4s;
}

/* Hover effect */
.travel-card:hover{
    transform:translateY(-12px) scale(1.05);
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

/* Title inside card */
.travel-card h2{
    color:#ff6b81;
    margin-bottom:10px;
}

/* Paragraph */
.travel-card p{
    font-size:0.95rem;
    line-height:1.5;
    color:#444;
}
</style>
</head>

<body>

<nav>
    <a href="project.html">Home</a>
    <a href="about.html">About</a>
    <a href="mytravels.html">My Travels</a>
</nav>

<h1>My Travel Adventures</h1>

<div class="travel-container">

    <a href="travels.html" class="travel-card">
        <h2>🏝 Beach</h2>
        <p>Relaxing by the sea and enjoying the beautiful sunsets.</p>
    </a>

</div>

</body>
</html>
